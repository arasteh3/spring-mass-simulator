name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest build

    - name: Lint with flake8
      run: |
        flake8 .

    - name: Run tests
      run: |
        pytest

    - name: Build package
      run: |
        python -m build

    - name: Verify import
      run: |
        python -c "import spring_mass; print('CI import successful')"
